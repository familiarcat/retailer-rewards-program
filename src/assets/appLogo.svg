<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 48 48"
    width="120"  
    height="120"
    fill="none"
    aria-hidden="true">
    <defs>
        <linearGradient
            id="al-gold"
            x1="4" y1="4" x2="44" y2="44"
            gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#fff8e8" />
            <stop offset="25%"  stop-color="#fcd34d" />
            <stop offset="62%"  stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>
        <linearGradient
            id="al-gold-dim"
            x1="4" y1="4" x2="44" y2="44"
            gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#fcd34d" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#d97706" stop-opacity="0.25" />
        </linearGradient>
        <radialGradient id="al-glow" cx="48%" cy="42%" r="50%">
            <stop offset="0%"   stop-color="#fcd34d" stop-opacity="0.16" />
            <stop offset="80%"  stop-color="#f59e0b" stop-opacity="0.05" />
            <stop offset="100%" stop-color="#d97706" stop-opacity="0" />
        </radialGradient>
    </defs>
    <circle cx="24" cy="24" r="21.5" fill="url(#al-glow)" />
    <circle cx="24" cy="24" r="22.5" stroke="url(#al-gold)" stroke-width="2" />
    <circle cx="24" cy="24" r="18.8" stroke="url(#al-gold-dim)" stroke-width="0.6" />
    <line x1="24" y1="2.5"  x2="24" y2="5.5" stroke="url(#al-gold)" stroke-width="1.2" stroke-linecap="round" />
    <line x1="42.5" y1="24" x2="45.5" y2="24" stroke="url(#al-gold)" stroke-width="1.2" stroke-linecap="round" />
    <line x1="24" y1="42.5" x2="24" y2="45.5" stroke="url(#al-gold)" stroke-width="1.2" stroke-linecap="round" />
    <line x1="2.5" y1="24"  x2="5.5" y2="24"  stroke="url(#al-gold)" stroke-width="1.2" stroke-linecap="round" />
    <text
        x="5"
        y="29"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="bold"
